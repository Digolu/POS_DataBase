<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja — Início</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #c8f060;
    --text: #f0ede8;
    --text-muted: #7a7870;
    --text-soft: #b0ada8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px;
  }

  .titulo {
    text-align: center;
  }

  .titulo .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .titulo h1 {
    font-size: 48px;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .titulo h1 span {
    font-weight: 600;
    color: var(--accent);
  }

  .titulo p {
    font-size: 15px;
    color: var(--text-muted);
  }

  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    width: 260px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    background: #1e2a0e;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
  }

  .card h2 {
    font-size: 18px;
    font-weight: 600;
  }

  .card p {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .card .arrow {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
  }

  .rodape {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>

  <div class="titulo">
    <div class="logo">Sistema de Vendas</div>
    <h1>Bem-vindo à<br><span>sua loja</span></h1>
    <p>O que pretende fazer hoje?</p>
  </div>

  <div class="cards">
    <a href="/nova_venda/" class="card">
      <div class="card-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <h2>Nova Venda</h2>
      <p>Escolhe produtos e regista uma nova venda no sistema.</p>
      <div class="arrow">Entrar →</div>
    </a>

    <a href="/lista_vendas/" class="card">
      <div class="card-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <h2>Lista de Vendas</h2>
      <p>Consulta o histórico de todas as vendas realizadas.</p>
      <div class="arrow">Entrar →</div>
    </a>
  </div>

  <div class="rodape">Sistema POS v1.0</div>

</body>
</html>
